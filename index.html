<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Web</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="card">
        <div id="search">
            <input type="text" placeholder="Enter City Name Here"/>
            <button>
                <img src="search.png">
                
            </button>
        </div>
        <div id="desc">
            <img src="rain.png">
            <h1 id="temp">22°C</h1>
            <h2 id="city-name">New York</h2>
        </div>
        <div class="other">
            <div class="humidity">
                
                <img src="humidity.png" >
                <div class="other-box">
                    <p class="humidity" id="humidity-no">50%</p>
                
                    <p class="humidity">Humidity</p>
                </div>

            </div>
            <div class="wind">
                
                <img src="wind.png">
                <div class="other-box">
                    <p class="wind" id="wind-no">50Km/hr</p>
                
                    <p class="wind">Wind Speed </p>
                </div>

            </div>
        </div>

        

        
    </div>
    <script src="script.js"></script>

</body>
</html>
